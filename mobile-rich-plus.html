<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6f73" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>韩国旅行清单增强版</title>
  <style>

:root {
  --bg: #f3efe6;
  --paper: #fffaf1;
  --paper-strong: #fffdf8;
  --ink: #142d28;
  --muted: #6b7c77;
  --hairline: rgba(39, 69, 62, 0.12);
  --hairline-strong: rgba(39, 69, 62, 0.2);
  --mint: #2f6f73;
  --mint-dark: #224f55;
  --mint-soft: rgba(47, 111, 115, 0.12);
  --clay: #ef8a56;
  --clay-soft: rgba(239, 138, 86, 0.16);
  --blue: #426ed8;
  --blue-soft: rgba(66, 110, 216, 0.14);
  --danger: #bd5a45;
  --danger-soft: rgba(189, 90, 69, 0.13);
  --ok: #2f9a5c;
  --ok-soft: rgba(47, 154, 92, 0.14);
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 16px;
  --shadow-soft: 0 18px 42px rgba(28, 49, 44, 0.08);
  --shadow-lift: 0 24px 60px rgba(28, 49, 44, 0.13);
  --nav-height: 5.8rem;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 12% -4%, rgba(47, 111, 115, 0.22), transparent 30rem),
    radial-gradient(circle at 96% 8%, rgba(239, 138, 86, 0.2), transparent 26rem),
    linear-gradient(180deg, #fffbf3 0%, var(--bg) 48%, #ede5d7 100%);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.34) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.28) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.38), transparent 86%);
  opacity: 0.55;
}

.app {
  position: relative;
  z-index: 1;
  width: min(100%, 820px);
  margin: 0 auto;
  padding: 0.9rem 0.9rem 2.2rem;
}

h1,
h2,
h3,
h4,
p {
  margin: 0;
}

h1 {
  max-width: 9ch;
  color: #fff;
  font-size: clamp(2.2rem, 13vw, 4.4rem);
  line-height: 0.96;
  letter-spacing: -0.065em;
}

h2 {
  font-size: 1.38rem;
  line-height: 1.12;
  letter-spacing: -0.035em;
}

h3 {
  font-size: 1.07rem;
  line-height: 1.32;
  letter-spacing: -0.018em;
}

p,
li {
  line-height: 1.72;
}

p,
ul {
  color: var(--muted);
}

ul {
  margin: 0;
  padding-left: 1.15rem;
}

.card,
details {
  border: 1px solid rgba(255, 255, 255, 0.74);
  border-radius: var(--radius-xl);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 250, 242, 0.88)),
    var(--paper);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(18px);
}

.card {
  display: grid;
  gap: 0.95rem;
  padding: 1rem;
}

.hero {
  position: relative;
  overflow: hidden;
  min-height: 270px;
  margin-bottom: 1.05rem;
  padding: 1.15rem;
  align-content: end;
  border-color: rgba(255, 255, 255, 0.22);
  color: #fff;
  background:
    radial-gradient(circle at 18% 18%, rgba(95, 203, 184, 0.34), transparent 13rem),
    radial-gradient(circle at 96% 10%, rgba(255, 180, 121, 0.28), transparent 12rem),
    linear-gradient(135deg, #1e293b 0%, #0a5d50 48%, #102f35 100%);
  box-shadow: 0 26px 70px rgba(9, 52, 46, 0.28);
}

.hero::after {
  content: "";
  position: absolute;
  right: -3.4rem;
  bottom: -3.6rem;
  width: 12rem;
  height: 12rem;
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.06);
}

.hero > * {
  position: relative;
  z-index: 1;
}

.hero p {
  max-width: 33rem;
  color: rgba(255, 255, 255, 0.8);
}

.hero .chip,
.hero .status,
.hero .build-note,
.hero button {
  border-color: rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
}

.eyebrow,
.chip,
.status,
.time-chip,
.pill,
.quick-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: fit-content;
  min-height: 1.9rem;
  padding: 0.28rem 0.72rem;
  border-radius: 999px;
  background: var(--mint-soft);
  color: var(--mint-dark);
  font-size: 0.76rem;
  font-weight: 800;
  letter-spacing: 0.02em;
}

.eyebrow {
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.pill.warn,
.status.warn {
  background: var(--clay-soft);
  color: #98471f;
}

.pill.bad {
  background: var(--danger-soft);
  color: var(--danger);
}

.status.ok {
  background: var(--ok-soft);
  color: var(--ok);
}

.section {
  margin-top: 1.1rem;
  scroll-margin-top: 1rem;
}

.section-head {
  display: grid;
  gap: 0.32rem;
  margin: 0 0 0.75rem;
  padding: 0 0.15rem;
}

.section-head p,
.mini,
.build-note {
  font-size: 0.88rem;
}

.list,
.days,
.guide-grid,
.shop-grid {
  display: grid;
  gap: 0.78rem;
}

.phase-top,
.day-top,
.copy-row,
.mode-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.7rem;
  flex-wrap: wrap;
}

.checklist {
  display: grid;
  gap: 0.55rem;
  margin: 0;
  padding: 0;
  list-style: none;
}

.task {
  overflow: hidden;
  border: 1px solid rgba(39, 69, 62, 0.1);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.78);
  transition: transform 0.24s ease, border-color 0.24s ease, background 0.24s ease;
}

.task:active {
  transform: scale(0.988);
}

.task.done {
  border-color: rgba(47, 111, 115, 0.24);
  background:
    linear-gradient(90deg, rgba(47, 111, 115, 0.11), rgba(255, 255, 255, 0.78)),
    rgba(233, 248, 244, 0.92);
}

.task label {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.72rem;
  align-items: start;
  padding: 0.86rem 0.9rem;
}

.task input {
  position: relative;
  width: 1.22rem;
  height: 1.22rem;
  margin: 0.1rem 0 0;
  appearance: none;
  border: 1.5px solid rgba(47, 111, 115, 0.44);
  border-radius: 0.42rem;
  background: #fff;
  box-shadow: inset 0 1px 1px rgba(20, 45, 40, 0.08);
}

.task input:checked {
  border-color: var(--mint);
  background: var(--mint);
}

.task input:checked::after {
  content: "";
  position: absolute;
  left: 0.31rem;
  top: 0.11rem;
  width: 0.32rem;
  height: 0.62rem;
  border-right: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(45deg);
}

.task-text {
  color: var(--ink);
  line-height: 1.68;
  transition: color 0.25s ease, text-decoration-color 0.25s ease;
}

.task.done .task-text {
  color: rgba(20, 45, 40, 0.58);
  text-decoration: line-through;
  text-decoration-thickness: 2px;
  text-decoration-color: rgba(47, 111, 115, 0.42);
}

details {
  overflow: hidden;
}

summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.8rem;
  padding: 1rem;
  color: var(--ink);
  cursor: pointer;
  list-style: none;
  font-weight: 850;
  letter-spacing: -0.015em;
}

summary::-webkit-details-marker {
  display: none;
}

summary::after {
  content: "+";
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  width: 1.85rem;
  height: 1.85rem;
  border-radius: 999px;
  background: var(--mint-soft);
  color: var(--mint-dark);
  transition: transform 0.22s ease;
}

details[open] summary {
  border-bottom: 1px solid var(--hairline);
}

details[open] summary::after {
  transform: rotate(45deg);
}

details .content {
  display: grid;
  gap: 0.8rem;
  padding: 0.1rem 1rem 1rem;
}

.time-row,
.quick-row,
.chip-row,
.shop-price {
  display: flex;
  flex-wrap: wrap;
  gap: 0.46rem;
}

.time-chip {
  background: rgba(66, 110, 216, 0.1);
  color: #315aaa;
}

.search-box {
  position: sticky;
  top: 0.55rem;
  z-index: 8;
  display: grid;
  gap: 0.75rem;
  border-color: rgba(255, 255, 255, 0.72);
  background: rgba(255, 252, 246, 0.88);
  backdrop-filter: blur(18px);
}

.search-wrap {
  display: grid;
  gap: 0.65rem;
}

button,
a.link,
.ghost-input {
  appearance: none;
  min-height: 2.55rem;
  border: 1px solid var(--hairline-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.88);
  color: var(--ink);
  font: inherit;
  font-weight: 780;
  text-decoration: none;
  box-shadow: 0 8px 20px rgba(28, 49, 44, 0.05);
  transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
}

button,
a.link {
  padding: 0.72rem 0.95rem;
}

button:active,
a.link:active,
.quick-chip:active {
  transform: scale(0.985);
}

.ghost-input {
  width: 100%;
  padding: 0.85rem 1rem;
  font-weight: 560;
}

.ghost-input:focus {
  outline: 3px solid rgba(47, 111, 115, 0.14);
  border-color: rgba(47, 111, 115, 0.4);
  background: #fff;
}

.quick-chip {
  border: 1px solid var(--hairline);
  cursor: pointer;
  box-shadow: none;
}

.note {
  padding: 0.95rem 1rem;
  border: 1px solid rgba(239, 138, 86, 0.2);
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(239, 138, 86, 0.14), rgba(255, 255, 255, 0.72));
  color: #87452b;
  line-height: 1.72;
}

.shop-card {
  display: grid;
  gap: 0.62rem;
  padding: 1rem;
  border: 1px solid rgba(39, 69, 62, 0.11);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.75);
}

.meta-list {
  display: grid;
  gap: 0.52rem;
}

.meta-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.meta-label {
  color: var(--ink);
  font-weight: 850;
}

.result-chip {
  background: var(--blue-soft);
  color: #3459b4;
}

.empty {
  padding: 1rem;
  border: 1px dashed rgba(39, 69, 62, 0.2);
  border-radius: 20px;
  color: var(--muted);
  text-align: center;
  background: rgba(255, 255, 255, 0.58);
}

.toolbar {
  position: sticky;
  bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
  z-index: 12;
  margin-top: 1rem;
}

.toolbar-inner {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 0.4rem;
  width: 100%;
  padding: 0.5rem;
  border: 1px solid rgba(255, 255, 255, 0.7);
  border-radius: 28px;
  background: rgba(255, 253, 249, 0.9);
  box-shadow: 0 20px 44px rgba(28, 49, 44, 0.16);
  backdrop-filter: blur(20px);
}

.toolbar-inner .link,
.toolbar-inner button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 2.55rem;
  padding: 0.45rem 0.5rem;
  border-radius: 20px;
  font-size: 0.78rem;
  box-shadow: none;
}

@media (min-width: 760px) {
  .app {
    padding-top: 1.2rem;
  }

  .days,
  .shop-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .hero {
    min-height: 340px;
  }
}
/* Premium UI polish layer */
:root {
  --ink-900: #102923;
  --gold: #d99b4a;
  --gold-soft: rgba(217, 155, 74, 0.18);
  --glass: rgba(255, 255, 255, 0.74);
  --glass-strong: rgba(255, 255, 255, 0.9);
}

body {
  background:
    radial-gradient(circle at 0% 0%, rgba(47, 111, 115, 0.26), transparent 20rem),
    radial-gradient(circle at 100% 4%, rgba(217, 155, 74, 0.26), transparent 18rem),
    radial-gradient(circle at 50% 105%, rgba(40, 77, 71, 0.12), transparent 18rem),
    linear-gradient(180deg, #fffaf0 0%, #f4ecdf 50%, #ebe1d1 100%);
}

.app {
  padding-top: max(1rem, env(safe-area-inset-top, 0px));
}

.hero {
  min-height: 390px;
  padding: 1.25rem;
  border-radius: 36px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.12), transparent 34%),
    radial-gradient(circle at 20% 10%, rgba(169, 126, 83, 0.34), transparent 12rem),
    radial-gradient(circle at 88% 14%, rgba(247, 183, 105, 0.26), transparent 11rem),
    linear-gradient(145deg, #062d27 0%, #2f6f73 46%, #111827 100%);
  box-shadow:
    0 34px 80px rgba(7, 58, 50, 0.32),
    inset 0 1px 0 rgba(255, 255, 255, 0.16);
}

.hero::before {
  content: "ICN T1  ·  SEOUL";
  position: absolute;
  top: 1.05rem;
  right: 1.05rem;
  z-index: 1;
  padding: 0.42rem 0.68rem;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.12);
  color: rgba(255, 255, 255, 0.86);
  font-size: 0.68rem;
  font-weight: 900;
  letter-spacing: 0.13em;
}

.hero h1 {
  text-wrap: balance;
  text-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
}

.hero p {
  max-width: 28rem;
  font-size: 0.98rem;
}

.hero .copy-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.hero .copy-row button {
  min-height: 3rem;
  border-radius: 18px;
}

.card:not(.hero),
details,
.shop-card {
  border-color: rgba(255, 255, 255, 0.8);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 250, 241, 0.82)),
    var(--glass);
  box-shadow:
    0 18px 44px rgba(35, 54, 49, 0.085),
    inset 0 1px 0 rgba(255, 255, 255, 0.86);
}

.section-head {
  margin-top: 0.15rem;
  padding-left: 0.1rem;
}

.section-head h2 {
  display: flex;
  align-items: center;
  gap: 0.55rem;
}

.section-head h2::before {
  content: "";
  display: inline-block;
  width: 0.52rem;
  height: 1.35rem;
  border-radius: 999px;
  background: linear-gradient(180deg, var(--mint), var(--gold));
  box-shadow: 0 8px 18px rgba(47, 111, 115, 0.2);
}

.search-box {
  top: max(0.7rem, env(safe-area-inset-top, 0px));
  border-radius: 30px;
  border-color: rgba(255, 255, 255, 0.88);
  background: rgba(255, 250, 242, 0.88);
}

.ghost-input {
  min-height: 3.2rem;
  border-radius: 20px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.86));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
}

.quick-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.quick-chip,
#clear-search {
  min-height: 2.35rem;
  padding: 0.5rem 0.35rem;
  border-radius: 16px;
  font-size: 0.76rem;
}

.phase-top,
.day-top {
  align-items: flex-start;
  padding-bottom: 0.15rem;
}

.list > .card,
.days > .card {
  position: relative;
  overflow: hidden;
}

.list > .card::after,
.days > .card::after {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 4px;
  background: linear-gradient(90deg, var(--mint), rgba(217, 155, 74, 0.86), transparent);
  opacity: 0.8;
}

.days > .card {
  padding-left: 1.08rem;
}

.time-row {
  padding: 0.2rem 0 0.05rem;
}

.time-chip {
  min-height: 2rem;
  background:
    linear-gradient(180deg, rgba(66, 110, 216, 0.14), rgba(255, 255, 255, 0.68));
  color: #2f56aa;
}

details {
  border-radius: 25px;
}

summary {
  min-height: 3.8rem;
}

details[open] {
  box-shadow:
    0 22px 54px rgba(35, 54, 49, 0.11),
    inset 0 1px 0 rgba(255, 255, 255, 0.88);
}

details[open] summary {
  color: var(--mint-dark);
}

details .content {
  padding-bottom: 1.05rem;
}

.task {
  border-radius: 18px;
}

.task label {
  padding: 0.92rem 0.95rem;
}

.task.done {
  box-shadow: inset 4px 0 0 rgba(47, 111, 115, 0.46);
}

.task input {
  width: 1.28rem;
  height: 1.28rem;
  border-radius: 0.46rem;
}

.shop-card {
  border-radius: 22px;
}

.shop-card h3 {
  color: var(--ink-900);
}

.pill.bad {
  color: #9c402d;
}

.toolbar {
  bottom: calc(0.72rem + env(safe-area-inset-bottom, 0px));
}

.toolbar-inner {
  border-radius: 30px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 248, 238, 0.88));
}

.toolbar-inner .link,
.toolbar-inner button {
  flex-direction: column;
  gap: 0.12rem;
  min-height: 3rem;
  border: 0;
  background: transparent;
  color: rgba(16, 41, 35, 0.8);
  font-size: 0.74rem;
}

.toolbar-inner .link:nth-child(1)::before { content: "✓"; }
.toolbar-inner .link:nth-child(2)::before { content: "i"; }
.toolbar-inner .link:nth-child(3)::before { content: "D"; }
.toolbar-inner .link:nth-child(4)::before { content: "¥"; }
.toolbar-inner button::before { content: "↺"; }

.toolbar-inner .link::before,
.toolbar-inner button::before {
  display: grid;
  place-items: center;
  width: 1.35rem;
  height: 1.35rem;
  border-radius: 999px;
  background: var(--mint-soft);
  color: var(--mint-dark);
  font-size: 0.75rem;
  font-weight: 900;
}

@media (max-width: 430px) {
  .hero {
    min-height: 370px;
  }

  .hero .copy-row,
  .quick-row {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .toolbar-inner {
    grid-template-columns: repeat(5, minmax(0, 1fr));
  }
}

e={};saveTasks();render();});document.getElementById('copy-hotel').addEventListener('click',()=>copyText(hotelAddress));document.getElementById('copy-airport').addEventListener('click',()=>copyText('4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走，先确认退税 / 提货，再托运行李，再安检。'));document.getElementById('share').addEventListener('click',sharePage);document.querySelectorAll('[data-mark-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.markDay,true)));document.querySelectorAll('[data-clear-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.clearDay,false)));}
