<!DOCTYPE html>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;

      color: #142d28;
      background:
        radial-gradient(circle at 8% -8%, rgba(47,111,115,.22), transparent 260px),
        radial-gradient(circle at 100% 0%, rgba(217,155,74,.22), transparent 240px),

    main {
      width: min(100%, 720px);

      display: grid;
      gap: 14px;
    }
    section {
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 24px;
      padding: 16px;
      background: rgba(255,255,255,.82);

    .hero {
      min-height: 260px;
      display: grid;
      align-content: end;
      color: #fff;
      background:
        radial-gradient(circle at 16% 12%, rgba(169,126,83,.34), transparent 190px),
        radial-gradient(circle at 90% 12%, rgba(247,183,105,.26), transparent 170px),
        linear-gradient(145deg, #072f2a 0%, #2f6f73 46%, #111827 100%);
    }
    h1, h2, p { margin: 0; }
    h1 {
      max-width: 8ch;
      font-size: clamp(40px, 12vw, 68px);
      line-height: .96;
      letter-spacing: -.06em;
    }
    h2 { font-size: 21px; }
    p { color: #647771; line-height: 1.72; }
    .hero p { color: rgba(255,255,255,.82); }
    .links {
      display: grid;
      gap: 10px;
    }
    a {
      display: block;
      min-height: 52px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #fff;
      color: #142d28;
      text-decoration: none;
      font-weight: 800;
      border: 1px solid rgba(34,62,56,.12);
    }
    a.primary {
      background: linear-gradient(135deg, rgba(47,111,115,.18), rgba(255,255,255,.96));
      color: #224f55;
    }
    a.warn {
      background: linear-gradient(135deg, rgba(239,138,86,.18), rgba(255,255,255,.96));
      color: #8a4526;
    }
    code {
      display: block;
      overflow-wrap: anywhere;
      padding: 10px;
      border-radius: 14px;
      background: rgba(47,111,115,.08);
      color: #224f55;
      line-height: 1.55;
    }
  
/* Retheme: warm premium */

  --premium-slate:#334155;
  --premium-caramel:#d99b4a;

.hero{

.hero::before,
.hero .chip,
.hero .status,
.hero .build-note,
.hero button{
  border-color:rgba(255,255,255,.18);
  background:rgba(255,255,255,.1);
}
.section-head h2::before,
.list>.card::after,
.days>.card::after{
  background:linear-gradient(180deg,var(--premium-caramel),#7c4a1e) !important;
}
.quick-chip,
.time-chip,
.result-chip,
.pill{
  background:rgba(217,155,74,.12);
  color:#6f4518;
}
.status.ok,
.task input:checked{
  background:#2f6f73;
}
a.primary,
.btn-primary{
  background:linear-gradient(135deg,rgba(217,155,74,.18),rgba(255,255,255,.96)) !important;

</style>
</head>
