  {title:'🌙 T1 到 N6002 保姆线',open:true,bullets:['23:50 抵达仁川 T1，现实里大概率 01:00–01:30 出到 1F 到达层公共区域。','出到公共区后直接找 Bus / Airport Bus / Late-night Bus / Bus Ticket，不先逛便利店。','主住弘大就买 N6002 to Hongdae，目标 T1 01:00 / 01:40，最现实盯 01:40。','成人票按 17,000 KRW 准备，单独拿 20,000 KRW 韩元现金；现金优先，现场支持再用 Visa / 交通卡，支付宝不当夜巴主支付。','T1 到弘大约 45–65 分钟，到站后用 Naver Map 步行去酒店，02:30 左右入住是正常节奏。','错过 01:40：先看 04:00 / 04:40 后续夜巴，再考虑机场 / 云西过渡；真打车只走官方出租车站。']},
  {title:'📱 App 与硬通货',open:false,bullets:['导航用 Naver Map，翻译用 Papago，打车用 Kakao T。','eSIM、转换插头、充电宝、Visa、支付宝、微信、韩元现金、人民币现金和能用的银联卡都要提前准备。','你现在有 Visa：Visa 负责大部分刷卡消费，支付宝负责国内预付和部分韩国商户补位，韩元现金负责落地夜巴和交通充值，WOWPASS 负责市区刷卡兜底。','WOWPASS 可以做支付和交通卡兜底，但它不是免费神卡。']},
  {title:'💳 有 Visa 怎么付更稳',open:false,bullets:['出发前：酒店、eSIM、保险和能预约的项目优先用支付宝 / 微信在国内付完，订单截图离线保存；Visa 作为境外主卡。','落地第一晚：优先用韩元现金解决 N6002 夜巴、便利店和应急，不在机场深夜研究复杂支付。','第二天：到弘大 / 明洞 / 首尔站一带办 WOWPASS，小额试刷成功后作为 Visa 之外的韩国本地支付兜底。','支付宝：看到 Alipay+ / ZeroPay 或店员确认 Alipay okay 再用；传统市场、路边小店、交通充值和老式储物柜仍按现金准备。','购物退税：Olive Young / Daiso / 大型商场优先刷 Visa；如果失败再切 WOWPASS 或支付宝，结账前问 Alipay okay? Tax refund okay? 即时退税看护照和店铺规则，不是必须 Visa。']},
  {title:'🛍 买什么更丰富：面膜 / 口红 / 香水 / 衣服',open:false,bullets:['面膜 / 棉片优先看 Olive Young：Mediheal、Abib、Biodance、Torriden 这类更适合你这次少量带回。','彩妆优先看唇妆，不要第一次就重仓底妆；平价看 rom&nd、3CE，想更精致可以看 HERA。','香氛优先小容量和礼盒：Tamburins、Nonfiction、Granhand 适合线下闻；大牌香水先在线上免税比价再决定。','衣服分两路：GOTO Mall 买平价基础款和小配件，Musinsa Standard 买真正会穿回国的主力单品。','伴手礼优先海苔、杏仁、咖啡包、护手霜、旅行装；不要买大件摆件和一堆普通面膜。','你 17 岁，这次买得丰富可以，但别买得像库存。']},
    {title:'💸 预算分档怎么买',open:false,bullets:['500 RMB 左右：主打痘痘贴、护手霜、唇膏、面膜 / 棉片、海苔、杏仁、旅行装；Olive Young + Daiso / 便利店就够。','1000 RMB 左右：在 500 档基础上加 Dr.G、Torriden、Mediheal，再挑 1 支唇釉或 1 件基础款衣服。','2000 RMB 左右：这是你这次最稳主力档，药妆主清单 + 1–2 件基础款衣服 + 1 个香氛小件或 1–2 支彩妆。','3000 RMB 以上：才考虑大牌护肤、免税香水、HERA / 3CE 等更精致彩妆，但仍然要先线上免税比价。','一旦预算快到顶，就优先保留 Dr.G、Torriden、痘痘贴和真会穿的衣服，砍掉冲动加购。']},
  {title:'🗺 按区域逛店：明洞 / 弘大 / GOTO / 免税',open:false,bullets:['明洞：主买 Olive Young 药妆、防晒、精华、痘痘贴、棉片和唇部小彩妆；不建议一路买主街小吃。','弘大 / 延南：主买文具、小物、帽子、袜子、轻配饰和伴手礼，适合慢逛，不适合做全场大采购。','GOTO Mall：主买基础款上衣、薄外套、裙子、袜子、小包和简单饰品；先逛一圈再回头补。','Musinsa Standard：主买真的会穿回国的卫衣、T 恤、衬衫、牛仔和基础裤；不是最便宜，但更稳。','线上免税：只看大牌护肤、香水、彩妆、礼盒；先比价、领券、再下单，不在线下免税店临时冲动买。']},
  {title:'🧾 按天采购单：4/26 / 4/27 / 4/28',open:false,bullets:['4/26 明洞药妆日：先看 1+1 / SALE / Tax Refund，再按 Dr.G / Torriden / 痘痘贴 / Mediheal / Round Lab 顺序拿货。','4/26 彩妆只补 1–2 件：rom&nd、3CE、HERA 里挑明确想要的，不整排试色带走；香氛今天只试，不大买大瓶。','4/26 付款顺序固定：Visa → WOWPASS → 支付宝 → 现金；结账后立刻分开收小票、退税单、未拆封商品。','4/27 白天先 GOTO Mall，先设服饰预算上限，再买基础款上衣、薄外套、袜子、小包、小配饰；不买难带大件。','4/27 如果还想买更稳的基础款，再去 Musinsa Standard，只补 1–2 件真会穿回国的卫衣 / T 恤 / 衬衫 / 牛仔。','4/28 回程补漏日只买缺项，药妆只补消耗品；香水 / 大牌 / 高客单彩妆今天不再新开坑。','4/28 回酒店后提前区分退税商品、托运行李、随身物品、机场免税提货；大额退税商品不要先托运。']},
  {title:'🏨 住宿预订注意事项',open:false,bullets:['现在就订，最晚不要晚于出发前 3–5 天；你要抢的是 17 岁可入住、凌晨 2 点后 self check-in、能国内预付或 Visa 担保。','首选 Hongik Univ. Station / 홍대입구역，尤其 2、3、8 号口附近，步行 3–8 分钟最好；次选 Hapjeong Station / 합정역。','下单前必须问：17 岁能否单独入住、是否接受 guardian consent form、是否支持 after 2:00 AM self check-in、是否能在线预付或 Visa 担保。','直接发酒店：I am 17 years old and will arrive after midnight. Can I check in alone with guardian consent form? Do you support self check-in after 2:00 AM?','不要订 motel / love hotel / 成人限定、23:00 前必须入住、离地铁 12 分钟以上、山坡房、只有韩文说明或房东不回消息的房。']},
  {title:'🚇 交通卡怎么买最便宜',open:false,bullets:['这趟不是买一次性 4 天票。4/24 深夜 N6002 机场夜巴单独用韩元现金，4/25 早上再处理市区交通卡。','Plan A：Climate Card 短期票，优先看 5 日票，覆盖 4/25、4/26、4/27、4/28 市区地铁公交；实体卡和票价以现场机器显示为准。','你有 Visa，可以先试机器是否支持海外 Visa；不行就用韩元现金。','Plan B：T-money / WOWPASS 交通功能。交通余额通常要用 KRW 现金单独充值，购物余额和交通余额不是一回事。','身上至少留 10,000–20,000 KRW 专门给交通充值，别全花在购物。','如果 Climate Card 机器卡住，不要耗太久，直接退一步用 T-money / WOWPASS 交通功能。']},
  {title:'🗣 软件怎么搜 / 怎么问',open:false,bullets:['Naver Map 搜索：Incheon Airport Terminal 1 / 인천공항1터미널；Hongik Univ. Station / 홍대입구역；Gyeongbokgung Station / 경복궁역；Express Bus Terminal Station / 고속터미널역。','明洞药妆搜 Olive Young Myeongdong Town / 올리브영 명동타운；GOTO Mall 搜 고투몰；汉江搜 Banpo Hangang Park / 반포한강공원。','Papago 问夜巴：Does this bus go to Hongdae? / 이 버스 홍대 가나요?','买票：N6002 to Hongdae, one person, please. / N6002 홍대 방향 한 명이요.','付款：Can I pay by Visa? / 비자카드 결제 되나요?；支付宝：Can I use Alipay? / 알리페이 되나요?','退税：Immediate tax refund, please. / 즉시 환급 해주세요.','酒店：I am 17 years old. Can I check in alone with guardian consent form?']},
  {title:'💳 WOWPASS（金卡）怎么办',open:false,bullets:['你有 Visa，WOWPASS 不是必须主卡，是韩国本地支付、换汇和交通兜底。','第一晚不办：23:50 到 T1 后直接用韩元现金坐 N6002 去弘大。','官方 FAQ 写明仁川机场目前没有可用 WOW Exchange kiosk；第二天去弘大 / 明洞 / 首尔站附近机器再办。','办卡时选 English / Chinese，按机器提示发行卡、充值、绑定 App；第一次只充 50,000–100,000 KRW 试刷。','WOWPASS 的购物余额和 T-money 交通余额分开，交通余额通常要用 KRW 现金在便利店或地铁蓝色 T-money 机器充值。','丢卡后如果已绑定 App，先在 App 里暂停卡片；刷卡失败就切 Visa。']},
  {title:'🛒 购物具体流程',open:false,bullets:['Olive Young：进店先看 1+1、SALE、Tax Refund，再拿 Dr.G、Torriden、痘痘贴、Mediheal、Round Lab。','结账前实体护照拿手上，直接问 Alipay okay? Tax refund okay?；付款顺序是 Visa → WOWPASS → 支付宝 → 现金。','结账后看小票有没有即时退税或 tax refund 信息，小票和未拆封商品分开放。','GOTO Mall：先设 50,000–100,000 KRW 预算，只买基础款和小配件；小店现金最稳，能刷再刷 Visa。','机场退税：先退税 / 海关验货，再托运行李，再安检；大额退税商品不要先托运。','回酒店当天就清点买了什么、几件、多少钱、是否退税，不要拖到回程日。']},
  {title:'🚫 海关与 17 岁特别注意',open:false,bullets:['肉类、水果、蔬菜、种子、中药材这类别带。','你 17 岁，不建议碰烟酒额度逻辑，最稳就是不买不带。','酒店可能要求监护人同意书和监护人证件复印件，提前邮件确认。']},

function renderShopping(){const visible=shopping.filter((item)=>matchesQuery([item.kind,item.zone,item.budget,item.name,item.where,item.fit,item.kr,item.cn,item.gap,item.tip])); if(!visible.length) return '<div class="empty">购物区没有匹配结果。</div>'; return visible.map((item)=>`<article class="shop-card"><div class="shop-price"><span class="pill">${item.kind}</span><span class="pill warn">${item.zone}</span><span class="pill bad">${item.budget}</span></div><h3>${item.name}</h3><div class="shop-price"><span class="pill">${item.where}</span><span class="pill warn">${item.fit}</span><span class="pill bad">${item.gap}</span></div><p class="mini">韩国：${item.kr}｜国内：${item.cn}</p><p class="mini">${item.tip}</p></article>`).join('');}
function loadTasks(){try{return JSON.parse(localStorage.getItem(TASK_KEY)||'{}')}catch{return {}}}
function loadUi(){try{return JSON.parse(localStorage.getItem(UI_KEY)||'{"search":"","todayOnly":false}')}catch{return {search:'',todayOnly:false}}}
let tasksState=loadTasks();
let uiState=loadUi();
function saveTasks(){localStorage.setItem(TASK_KEY,JSON.stringify(tasksState));}
function saveUi(){localStorage.setItem(UI_KEY,JSON.stringify(uiState));}
function isDone(id){return Boolean(tasksState[id]);}
function normalize(text){return String(text).toLowerCase();}
function matchesQuery(parts){const q=normalize(uiState.search.trim());if(!q) return true;return parts.some((part)=>normalize(part).includes(q));}
function getTodayIndex(){const now=new Date();const pad=(value)=>String(value).padStart(2,'0');const today=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;const idx=tripDates.indexOf(today);if(idx!==-1) return idx; if(today < tripDates[0]) return 0; return tripDates.length-1;}
function copyText(text){navigator.clipboard?.writeText(text).then(()=>alert('已复制，可直接粘贴到地图或备忘录。')).catch(()=>prompt('请手动复制下面内容：',text));}
function sharePage(){const data={title:'韩国旅行清单增强版',text:'手机直接打开就能用的韩国旅行清单',url:location.href};if(navigator.share){navigator.share(data).catch(()=>{});}else{copyText(location.href);}}
function setSearch(value){uiState.search=value;saveUi();render();}
function toggleTodayMode(){uiState.todayOnly=!uiState.todayOnly;saveUi();render();}
function renderTask(id,text){const done=isDone(id);return `<li class="task ${done?'done':''}"><label><input type="checkbox" data-check-id="${id}" ${done?'checked':''}><span class="task-text">${text}</span></label></li>`;}
function renderPhases(){return phases.map((phase)=>{const visibleItems=phase.items.filter((item)=>matchesQuery([phase.title,phase.subtitle,item]));if(!visibleItems.length) return '';const total=visibleItems.length;const done=visibleItems.filter((_,i)=>isDone(`phase-${phase.title}-${phase.items.indexOf(visibleItems[i])}`)).length;return `<article class="card"><div class="phase-top"><div><span class="chip">${phase.title}</span><h3>${phase.subtitle}</h3></div><span class="status ${done===total?'ok':''}">${done}/${total}</span></div><ul class="checklist">${visibleItems.map((item)=>renderTask(`phase-${phase.title}-${phase.items.indexOf(item)}`,item)).join('')}</ul></article>`;}).join('');}
function renderGuide(){return guideSections.filter((item)=>matchesQuery([item.title,...item.bullets])).map((item)=>`<details class="guide" ${item.open?'open':''}><summary>${item.title}</summary><div class="content"><ul>${item.bullets.map((line)=>`<li>${line}</li>`).join('')}</ul></div></details>`).join('');}
function dayProgress(day){const total=day.tasks.length;const done=day.tasks.filter((task)=>isDone(task.id)).length;return {done,total};}
function getVisibleDays(){let visible=days; if(uiState.todayOnly){visible=[days[getTodayIndex()]];} const q=uiState.search.trim(); if(q){visible=visible.filter((day)=>matchesQuery([day.day,day.goal,day.note,...day.times,...day.tasks.map((t)=>t.text)]));} return visible;}
function renderDayCard(day){const {done,total}=dayProgress(day);return `<article class="card"><div class="day-top"><div><span class="chip">${day.day}</span><h3>${day.goal}</h3></div><span class="status ${done===total?'ok':''}">执行清单：${done}/${total}</span></div><div class="time-row">${day.times.map((t)=>`<span class="time-chip">${t}</span>`).join('')}</div><p class="mini">${day.note}</p><ul class="checklist">${day.tasks.map((task)=>renderTask(task.id,task.text)).join('')}</ul><div class="copy-row"><button data-mark-day="${day.day}">当天全勾</button><button data-clear-day="${day.day}">清空当天</button></div></article>`;}
function renderDays(){const visible=getVisibleDays(); if(!visible.length) return '<div class="empty">没有匹配到相关内容，试试搜 “退税” 或 “N6002”。</div>'; return visible.map(renderDayCard).join('');}
function renderShopping(){const visible=shopping.filter((item)=>matchesQuery([item.name,item.kr,item.cn,item.gap,item.tip])); if(!visible.length) return '<div class="empty">购物区没有匹配结果。</div>'; return visible.map((item)=>`<article class="shop-card"><h3>${item.name}</h3><div class="shop-price"><span class="pill">韩国：${item.kr}</span><span class="pill warn">国内：${item.cn}</span><span class="pill bad">${item.gap}</span></div><p class="mini">${item.tip}</p></article>`).join('');}
function markDay(dayName,value){const day=days.find((d)=>d.day===dayName); if(!day) return; day.tasks.forEach((task)=>{tasksState[task.id]=value;}); saveTasks(); render();}
function render(){const totalTasks=[...phases.flatMap((p)=>p.items.map((_,i)=>`phase-${p.title}-${i}`)),...days.flatMap((d)=>d.tasks.map((t)=>t.id))];const doneTasks=totalTasks.filter((id)=>isDone(id)).length;const visibleDays=getVisibleDays();const todayLabel=days[getTodayIndex()].day;document.getElementById('app').innerHTML=`<section class="hero card"><span class="eyebrow">KR MOBILE PRO</span><h1>韩国旅行清单增强版</h1><p>现在是更丰富的手机版本：四阶段、终极指南、每天任务、购物建议都整合在一个页面里，手机直接点开就能用。</p><div class="chip-row"><span class="chip">总任务：${doneTasks}/${totalTasks.length}</span><span class="status warn">公网直开版</span><span class="build-note">更新于 2026-04-19</span></div><div class="copy-row"><button id="share">分享链接</button><button id="copy-hotel">复制酒店地址</button><button id="copy-airport">复制返程提醒</button></div></section><section class="section"><div class="card search-box"><div class="search-wrap"><input id="search-input" class="ghost-input" type="search" placeholder="搜 面膜 / 口红 / 香水 / 衣服 / 住宿 / 交通卡 / N6002" value="${uiState.search.replace(/"/g,'&quot;')}" /><div class="quick-row"><button class="quick-chip" data-quick="住宿">住宿</button><button class="quick-chip" data-quick="交通卡">交通卡</button><button class="quick-chip" data-quick="Climate Card">Climate Card</button><button class="quick-chip" data-quick="500预算">500预算</button><button class="quick-chip" data-quick="2000档">2000档</button><button class="quick-chip" data-quick="明洞">明洞</button><button class="quick-chip" data-quick="药妆">药妆</button><button class="quick-chip" data-quick="Musinsa">Musinsa</button><button class="quick-chip" data-quick="弘大">弘大</button><button class="quick-chip" data-quick="回程">回程</button><button class="quick-chip" data-quick="补漏">补漏</button><button class="quick-chip" data-quick="免税">免税</button><button class="quick-chip" data-quick="N6002">N6002</button><button class="quick-chip" data-quick="退税">退税</button><button class="quick-chip" data-quick="支付宝">支付宝</button><button class="quick-chip" data-quick="金卡">金卡</button><button class="quick-chip" data-quick="购物">购物</button><button class="quick-chip" data-quick="问路">问路</button><button class="quick-chip" data-quick="酒店">酒店</button><button class="quick-chip" data-quick="Dr.G">Dr.G</button><button class="quick-chip" data-quick="面膜">面膜</button><button class="quick-chip" data-quick="口红">口红</button><button class="quick-chip" data-quick="香水">香水</button><button class="quick-chip" data-quick="衣服">衣服</button><button class="quick-chip" data-quick="GOTO">GOTO</button><button id="clear-search">清空搜索</button></div></div><div class="mode-row"><span class="chip result-chip">当前结果：${visibleDays.length} 天任务视图</span><button id="toggle-today">${uiState.todayOnly ? `今天模式：${todayLabel}` : '打开今天模式'}</button></div></div></section><section class="section" id="phases"><div class="section-head"><span class="eyebrow">Timeline</span><h2>四阶段执行面板</h2><p>按阶段勾掉你已经完成的动作。</p></div><div class="list">${renderPhases() || '<div class="empty">四阶段里没有匹配结果。</div>'}</div></section><section class="section" id="guide"><div class="section-head"><span class="eyebrow">Ultimate Guide</span><h2>全方位终极指南</h2><p>保留最关键的机场、支付、App、海关、退税和住宿信息。</p></div><div class="guide-grid">${renderGuide() || '<div class="empty">指南里没有匹配结果。</div>'}</div><div class="card meta-list"><div class="meta-row"><span class="meta-label">酒店默认地址：</span><span>${hotelAddress}</span></div><div class="meta-row"><span class="meta-label">返程提醒：</span><span>4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走。</span></div></div></section><section class="section" id="days"><div class="section-head"><span class="eyebrow">Daily Plan</span><h2>每天要干什么</h2><p>每天一张卡，点一下就勾掉，刷新后也会记住。</p></div><div class="days">${renderDays()}</div></section><section class="section" id="shopping"><div class="section-head"><span class="eyebrow">Shopping</span><h2>最值得买什么</h2><p>按轻体积、价差明显、看起来更像自用或送人的方向挑，不走大货囤积路线。</p></div><div class="shop-grid">${renderShopping()}</div><div class="note">17 岁这次最稳的策略：不碰烟酒，不碰大体积保健品，不走“像商业代购”的大货逻辑；有 Visa 就优先 Visa，失败再切 WOWPASS / 支付宝 / 现金三套兜底。</div></section><div class="toolbar"><div class="toolbar-inner"><a class="link" href="#phases">四阶段</a><a class="link" href="#guide">指南</a><a class="link" href="#days">每天任务</a><a class="link" href="#shopping">买什么</a><button id="reset">清空进度</button></div></div>`;document.querySelectorAll('[data-check-id]').forEach((input)=>{input.addEventListener('change',(event)=>{tasksState[event.target.dataset.checkId]=event.target.checked;saveTasks();render();});});document.querySelectorAll('[data-quick]').forEach((btn)=>btn.addEventListener('click',()=>setSearch(btn.dataset.quick)));document.getElementById('search-input').addEventListener('input',(e)=>setSearch(e.target.value));document.getElementById('clear-search').addEventListener('click',()=>setSearch(''));document.getElementById('toggle-today').addEventListener('click',toggleTodayMode);document.getElementById('reset').addEventListener('click',()=>{if(!confirm('确认清空当前设备里的所有勾选进度吗？')) return;tasksState={};saveTasks();render();});document.getElementById('copy-hotel').addEventListener('click',()=>copyText(hotelAddress));document.getElementById('copy-airport').addEventListener('click',()=>copyText('4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走，先确认退税 / 提货，再托运行李，再安检。'));document.getElementById('share').addEventListener('click',sharePage);document.querySelectorAll('[data-mark-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.markDay,true)));document.querySelectorAll('[data-clear-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.clearDay,false)));}
render();
