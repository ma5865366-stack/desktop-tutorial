<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d8a74" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>韩国旅行清单手机版</title>
  <style>
    :root{--bg:#f6f2ea;--surface:#fffdfa;--line:rgba(59,93,89,.14);--text:#16322d;--muted:#5f726e;--accent:#0d8a74;--accent-soft:rgba(13,138,116,.1);--ok:#2f9a5c;--ok-soft:rgba(47,154,92,.14);--warn:#ff8357;--warn-soft:rgba(255,131,87,.14);--radius:22px;--shadow:0 18px 40px rgba(31,52,47,.08)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;padding-bottom:calc(6rem + env(safe-area-inset-bottom,0px));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(13,138,116,.12),transparent 30%),radial-gradient(circle at top right,rgba(255,131,87,.16),transparent 26%),linear-gradient(180deg,#fbf8f2 0%,#f6f2ea 48%,#f4eee4 100%);-webkit-text-size-adjust:100%}.app{width:min(100%,760px);margin:0 auto;padding:.9rem .9rem 2rem}.card,details{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,250,243,.9)),var(--surface);box-shadow:var(--shadow)}.card{display:grid;gap:.9rem;padding:1rem}.hero{margin-bottom:1rem}.eyebrow,.chip,.status{display:inline-flex;align-items:center;justify-content:center;width:fit-content;min-height:1.9rem;padding:.25rem .7rem;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:.78rem;font-weight:700}.status.ok{background:var(--ok-soft);color:var(--ok)}.status.warn{background:var(--warn-soft);color:#9f4b24}h1,h2,h3,p{margin:0}h1{font-size:1.9rem;line-height:1.08}h2{font-size:1.35rem;line-height:1.15}h3{font-size:1.08rem;line-height:1.3}p{color:var(--muted);line-height:1.7}.section{margin-top:1rem}.section-head{display:grid;gap:.35rem;margin-bottom:.75rem}.list,.days{display:grid;gap:.75rem}.phase-top,.day-top,.toolbar{display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}.checklist{list-style:none;padding:0;margin:0;display:grid;gap:.55rem}.task{border:1px solid rgba(59,93,89,.1);border-radius:16px;background:rgba(255,255,255,.78);transition:all .25s ease}.task.done{background:rgba(233,248,244,.92);border-color:rgba(13,138,116,.18)}.task label{display:grid;grid-template-columns:auto 1fr;gap:.7rem;align-items:start;padding:.8rem .85rem}.task input{appearance:none;margin:0;width:1.2rem;height:1.2rem;border-radius:.35rem;border:1.5px solid rgba(13,138,116,.42);background:#fff;position:relative}.task input:checked{background:var(--accent);border-color:var(--accent)}.task input:checked::after{content:"";position:absolute;left:.28rem;top:.08rem;width:.32rem;height:.64rem;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg)}.task-text{line-height:1.65}.task.done .task-text{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(22,50,45,.55)}details{overflow:hidden}summary{list-style:none;cursor:pointer;padding:1rem;font-weight:800;display:flex;justify-content:space-between;gap:.75rem}summary::-webkit-details-marker{display:none}details[open] summary{border-bottom:1px solid var(--line)}details .content{display:grid;gap:.8rem;padding:0 1rem 1rem}ul{margin:0;padding-left:1.15rem;color:var(--muted);line-height:1.7}.time-row{display:flex;flex-wrap:wrap;gap:.45rem}.time-chip{display:inline-flex;align-items:center;justify-content:center;min-height:1.8rem;padding:.22rem .62rem;border-radius:999px;background:rgba(13,138,116,.08);color:var(--accent);font-size:.76rem;font-weight:700}.toolbar{position:sticky;bottom:calc(.8rem + env(safe-area-inset-bottom,0px));z-index:10;margin-top:1rem}.toolbar-inner{display:flex;gap:.55rem;flex-wrap:wrap;width:100%;padding:.7rem;border-radius:999px;border:1px solid var(--line);background:rgba(255,253,249,.92);backdrop-filter:blur(16px);box-shadow:var(--shadow)}button,a.link{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.92);color:var(--text);border-radius:999px;padding:.72rem .95rem;font:inherit;font-weight:700;text-decoration:none}button:active,a.link:active{transform:scale(.985)}@media(min-width:720px){.days{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <script>
    const STORAGE_KEY='kr-trip-mobile-pages-v1';
    const hotelAddress='22-3 Wausan-ro 29ra-gil, Mapo-gu, Seoul';
    const phases=[{title:'阶段一｜出发前',subtitle:'本地环境配置',items:['买好韩国 eSIM，保存二维码和安装截图。','装好 Naver Map、Papago、Kakao T。','确认 Visa / Mastercard 能境外刷卡。','提前下乐天 / 新罗 / 新世界免税 App 领券。']},{title:'阶段二｜抵达机场',subtitle:'系统初始化',items:['落地后优先出关，不在机场乱逛。','主住弘大就盯 N6002，主住钟路就盯 N6701。','次日再买 Climate Card，不在落地夜研究。']},{title:'阶段三｜首尔执行',subtitle:'游玩与购物',items:['景福宫 / 北村 / 益善洞 / 广藏市场走经典线。','药妆只买 1+1、SALE、即时退税款。','衣服主战场是 GOTO Mall，不是潮牌街。','吃饭优先吐司、饭卷、汤饭、炸酱面。']},{title:'阶段四｜回程',subtitle:'收口与资源释放',items:['大额退税商品别先托运。','先确认退税 / 提货，再托运，再安检。','回程日不开新景点，只做补漏和去机场。']}];
    const guide=[{title:'🌙 深夜到达 / 离开仁川 T1',open:true,content:['23:50 抵达仁川 T1，现实里优先盯 01:00 / 01:40 的 N6002 去弘大。','深夜打车会有夜间加价，除非真的错过夜巴，不然不要默认打车。','4/28 晚班机返程时，至少提前 3 小时回到 T1；有退税和免税提货时按 3.5 小时准备。']},{title:'📱 App 与硬通货',open:false,content:['导航用 Naver Map，翻译用 Papago，打车用 Kakao T。','eSIM、转换插头、充电宝、可境外使用的银行卡都要提前准备。','WOWPASS 可以做支付和交通卡兜底，但它不是免费神卡。']},{title:'🚫 海关与 17 岁特别注意',open:false,content:['肉类、水果、蔬菜、种子、中药材这类别带。','你 17 岁，不建议碰烟酒额度逻辑，最稳就是不买不带。','酒店可能要求监护人同意书和监护人证件复印件，提前邮件确认。']},{title:'💸 退税顺序',open:false,content:['即时退税先在店里直接做，记得带实体护照。','高额商品默认按先机场确认、后托运处理。','过安检后再去免税提货点拿线上订单。']}];
    const days=[{day:'Day 1｜4/24 周五晚',goal:'落地后只做出关、上车、睡觉',times:['落地后 00:00–00:40','出关后 00:40–01:10','上车到入住 01:00–02:30'],tasks:[{id:'d1a',text:'酒店地址、入住方式和去酒店路线都已截图'},{id:'d1b',text:'已经确认 N6002 站点并顺利上车'},{id:'d1c',text:'只做便利店补给，没有夜里乱逛'},{id:'d1d',text:'手机和充电宝都已充上电'}]},{day:'Day 2｜4/25 周六',goal:'先买 Climate Card，再走钟路经典线',times:['早上 09:30–11:30','中午 11:30–14:30','下午 14:30–18:00','晚上 18:00–20:30'],tasks:[{id:'d2a',text:'已经在弘大买好 Climate Card'},{id:'d2b',text:'今天已把景福宫放在第一站，不留到周二'},{id:'d2c',text:'北村只顺路看，没有在小巷绕太久'},{id:'d2d',text:'广藏市场只吃了最想吃的 1–2 样，没有一路乱买'}]},{day:'Day 3｜4/26 周日',goal:'弘大 / 延南慢逛，下午去明洞扫药妆',times:['早上 10:00–12:30','中午 12:30–14:00','下午 14:00–18:30','晚上 18:30–21:00'],tasks:[{id:'d3a',text:'今天是轻松日，没有一早赶景点'},{id:'d3b',text:'Olive Young 已按清单买，优先看 1+1 和 SALE'},{id:'d3c',text:'今天咖啡控制在一杯，没有被网红店带节奏'},{id:'d3d',text:'退税小票和未拆封商品已经分开放好'}]},{day:'Day 4｜4/27 周一',goal:'GOTO Mall + 盘浦汉江，少花钱不走远',times:['早上 09:30–12:30','中午 12:30–14:00','下午 14:00–17:30','晚上 17:30–20:00'],tasks:[{id:'d4a',text:'今天主跑 GOTO Mall，没有临时再加圣水或江南'},{id:'d4b',text:'只买了基础款衣服和小配件，没有冲动拿大件'},{id:'d4c',text:'午饭和晚饭都保持了一人食简餐节奏'},{id:'d4d',text:'傍晚只去盘浦汉江看夜景，没有再加收费项目'}]},{day:'Day 5｜4/28 周二',goal:'4/28 晚班机返程版：补漏、退税、去机场',times:['早上 10:00–12:30','中午 12:30–15:00','下午 15:00–18:00','晚上 18:00 以后'],tasks:[{id:'d5a',text:'最后补货只在弘大 / 明洞的既定店铺完成'},{id:'d5b',text:'退税小票、护照、充电宝和未拆封商品已单独整理好'},{id:'d5c',text:'今天没有再开新景点或新商场'},{id:'d5d',text:'已经按 23:40 航班节奏提前出发去仁川 T1'}]}];
    function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return {}}}
    let state=loadState();
    function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
    function isDone(id){return Boolean(state[id]);}
    function renderTask(id,text){const done=isDone(id);return `<li class="task ${done?'done':''}"><label><input type="checkbox" data-check-id="${id}" ${done?'checked':''}><span class="task-text">${text}</span></label></li>`;}
    function renderPhases(){return phases.map((phase)=>{const total=phase.items.length;const done=phase.items.filter((_,i)=>isDone(`phase-${phase.title}-${i}`)).length;return `<article class="phase-card card"><div class="phase-top"><div><span class="chip">${phase.title}</span><h3>${phase.subtitle}</h3></div><span class="status ${done===total?'ok':''}">${done}/${total}</span></div><ul class="checklist">${phase.items.map((item,i)=>renderTask(`phase-${phase.title}-${i}`,item)).join('')}</ul></article>`;}).join('');}
    function renderGuide(){return guide.map((item)=>`<details class="guide" ${item.open?'open':''}><summary>${item.title}</summary><div class="content"><ul>${item.content.map((line)=>`<li>${line}</li>`).join('')}</ul></div></details>`).join('');}
    function dayProgress(day){const total=day.tasks.length;const done=day.tasks.filter((task)=>isDone(task.id)).length;return {done,total};}
    function renderDayCard(day){const {done,total}=dayProgress(day);return `<article class="day-card"><div class="day-top"><div><span class="chip">${day.day}</span><h3>${day.goal}</h3></div><span class="status ${done===total?'ok':''}">执行清单：${done}/${total}</span></div><div class="time-row">${day.times.map((t)=>`<span class="time-chip">${t}</span>`).join('')}</div><ul class="checklist">${day.tasks.map((task)=>renderTask(task.id,task.text)).join('')}</ul></article>`;}
    function renderDays(){return days.map(renderDayCard).join('');}
    function copyText(text){navigator.clipboard?.writeText(text).then(()=>alert('已复制，可直接粘贴到地图或备忘录。')).catch(()=>prompt('请手动复制下面内容：',text));}
    function render(){const totalTasks=[...phases.flatMap((p)=>p.items.map((_,i)=>`phase-${p.title}-${i}`)),...days.flatMap((d)=>d.tasks.map((t)=>t.id))];const doneTasks=totalTasks.filter((id)=>isDone(id)).length;document.getElementById('app').innerHTML=`<section class="hero card"><span class="eyebrow">KR MOBILE</span><h1>韩国旅行清单手机版</h1><p>这是一份真正适合 iPhone / iPad 直接点开就用的旅行清单。勾选状态会自动保存在当前浏览器。</p><div class="chip-row"><span class="chip">总任务：${doneTasks}/${totalTasks.length}</span><span class="status warn">4/28 晚班机返程版</span></div></section><section class="section" id="phases"><div class="section-head"><span class="eyebrow">Timeline</span><h2>四阶段执行面板</h2><p>按阶段勾掉你已经完成的动作。</p></div><div class="list">${renderPhases()}</div></section><section class="section" id="guide"><div class="section-head"><span class="eyebrow">Ultimate Guide</span><h2>全方位终极指南</h2><p>保留最关键的机场、App、海关、退税和住宿信息，手机上快速查就够。</p></div><div class="guide-list">${renderGuide()}</div><div class="card copy-row"><button id="copy-hotel">复制酒店地址</button><button id="copy-airport">复制返程提醒</button></div></section><section class="section" id="days"><div class="section-head"><span class="eyebrow">Daily Plan</span><h2>每天要干什么</h2><p>这是最适合手机直接点着用的区域，每天一张卡，点一下就勾掉。</p></div><div class="days">${renderDays()}</div></section><div class="toolbar"><div class="toolbar-inner"><a class="link" href="#phases">四阶段</a><a class="link" href="#guide">指南</a><a class="link" href="#days">每天任务</a><button id="reset">清空进度</button></div></div>`;document.querySelectorAll('[data-check-id]').forEach((input)=>{input.addEventListener('change',(event)=>{state[event.target.dataset.checkId]=event.target.checked;saveState();render();});});document.getElementById('reset').addEventListener('click',()=>{if(!confirm('确认清空当前设备里的所有勾选进度吗？')) return;state={};saveState();render();});document.getElementById('copy-hotel').addEventListener('click',()=>copyText(hotelAddress));document.getElementById('copy-airport').addEventListener('click',()=>copyText('4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走，先确认退税 / 提货，再托运行李，再安检。'));}
    render();
  </script>
</body>
</html>
