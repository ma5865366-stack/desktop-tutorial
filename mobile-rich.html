  <style>
    :root{--bg:#f6f2ea;--surface:#fffdfa;--line:rgba(59,93,89,.14);--text:#16322d;--muted:#5f726e;--accent:#0d8a74;--accent-soft:rgba(13,138,116,.1);--ok:#2f9a5c;--ok-soft:rgba(47,154,92,.14);--warn:#ff8357;--warn-soft:rgba(255,131,87,.14);--bad:#c95b47;--bad-soft:rgba(201,91,71,.14);--radius:22px;--shadow:0 18px 40px rgba(31,52,47,.08)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;padding-bottom:calc(6rem + env(safe-area-inset-bottom,0px));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(13,138,116,.12),transparent 30%),radial-gradient(circle at top right,rgba(255,131,87,.16),transparent 26%),linear-gradient(180deg,#fbf8f2 0%,#f6f2ea 48%,#f4eee4 100%);-webkit-text-size-adjust:100%}.app{width:min(100%,820px);margin:0 auto;padding:.9rem .9rem 2rem}.card,details{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,250,243,.9)),var(--surface);box-shadow:var(--shadow)}.card{display:grid;gap:.9rem;padding:1rem}.hero{margin-bottom:1rem}.eyebrow,.chip,.status,.time-chip,.pill,.quick-chip{display:inline-flex;align-items:center;justify-content:center;width:fit-content;min-height:1.9rem;padding:.25rem .7rem;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:.78rem;font-weight:700}.pill.warn,.status.warn{background:var(--warn-soft);color:#9f4b24}.pill.bad{background:var(--bad-soft);color:var(--bad)}.status.ok{background:var(--ok-soft);color:var(--ok)}h1,h2,h3,h4,p{margin:0}h1{font-size:1.95rem;line-height:1.08}h2{font-size:1.35rem;line-height:1.18}h3{font-size:1.06rem;line-height:1.3}p{color:var(--muted);line-height:1.72}.section{margin-top:1rem}.section-head{display:grid;gap:.35rem;margin-bottom:.75rem}.list,.days,.guide-grid,.shop-grid{display:grid;gap:.75rem}.phase-top,.day-top,.toolbar,.copy-row,.search-row,.mode-row{display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}.checklist{list-style:none;padding:0;margin:0;display:grid;gap:.55rem}.task{border:1px solid rgba(59,93,89,.1);border-radius:16px;background:rgba(255,255,255,.78);transition:all .25s ease}.task.done{background:rgba(233,248,244,.92);border-color:rgba(13,138,116,.18)}.task label{display:grid;grid-template-columns:auto 1fr;gap:.7rem;align-items:start;padding:.8rem .85rem}.task input{appearance:none;margin:0;width:1.2rem;height:1.2rem;border-radius:.35rem;border:1.5px solid rgba(13,138,116,.42);background:#fff;position:relative}.task input:checked{background:var(--accent);border-color:var(--accent)}.task input:checked::after{content:"";position:absolute;left:.28rem;top:.08rem;width:.32rem;height:.64rem;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg)}.task-text{line-height:1.65}.task.done .task-text{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(22,50,45,.55)}details{overflow:hidden}summary{list-style:none;cursor:pointer;padding:1rem;font-weight:800;display:flex;justify-content:space-between;gap:.75rem}summary::-webkit-details-marker{display:none}details[open] summary{border-bottom:1px solid var(--line)}details .content{display:grid;gap:.8rem;padding:0 1rem 1rem}ul{margin:0;padding-left:1.15rem;color:var(--muted);line-height:1.7}.time-row,.quick-row{display:flex;flex-wrap:wrap;gap:.45rem}.time-chip,.quick-chip{background:rgba(13,138,116,.08)}.mini{font-size:.86rem}.toolbar{position:sticky;bottom:calc(.8rem + env(safe-area-inset-bottom,0px));z-index:10;margin-top:1rem}.toolbar-inner{display:flex;gap:.55rem;flex-wrap:wrap;width:100%;padding:.7rem;border-radius:999px;border:1px solid var(--line);background:rgba(255,253,249,.92);backdrop-filter:blur(16px);box-shadow:var(--shadow)}button,a.link,.ghost-input{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.92);color:var(--text);border-radius:999px;padding:.72rem .95rem;font:inherit;font-weight:700;text-decoration:none}button:active,a.link:active,.quick-chip:active{transform:scale(.985)}.ghost-input{width:100%;font-weight:500}.search-box{display:grid;gap:.7rem}.search-wrap{display:grid;gap:.6rem}.quick-chip{border:1px solid var(--line);cursor:pointer}.note{padding:.85rem .95rem;border-radius:18px;background:var(--warn-soft);color:#87452b;line-height:1.7}.shop-card{display:grid;gap:.55rem;padding:.95rem;border:1px solid rgba(59,93,89,.12);border-radius:18px;background:rgba(255,255,255,.78)}.shop-price{display:flex;gap:.45rem;flex-wrap:wrap}.build-note{font-size:.82rem;color:#6b7d79}.meta-list{display:grid;gap:.4rem}.meta-row{display:flex;gap:.5rem;flex-wrap:wrap}.meta-label{font-weight:800;color:var(--text)}.hidden{display:none!important}.result-chip{background:rgba(74,117,214,.12);color:#3459b4}.empty{padding:1rem;border:1px dashed rgba(59,93,89,.18);border-radius:18px;color:var(--muted);text-align:center;background:rgba(255,255,255,.55)}@media(min-width:760px){.days,.shop-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>

<body>
<div class="app" id="app"></div>
<script>
const TASK_KEY='kr-trip-rich-mobile-v2-tasks';
const UI_KEY='kr-trip-rich-mobile-v2-ui';
const hotelAddress='22-3 Wausan-ro 29ra-gil, Mapo-gu, Seoul';
const tripDates=['2026-04-24','2026-04-25','2026-04-26','2026-04-27','2026-04-28'];
const phases=[
  {title:'阶段一｜出发前',subtitle:'本地环境配置',items:['买好韩国 eSIM，保存二维码、安装说明和客服截图。','装好 Naver Map、Papago、Kakao T，并保存酒店地址。','没有 Visa 就走支付宝国内预付 + 韩元现金落地 + WOWPASS 本地刷卡三层兜底。','提前用支付宝 / 微信把酒店、eSIM 和能预付的项目先付掉。','提前下乐天 / 新罗 / 新世界免税 App 领券；如果线上免税支付卡住，就改走线下 OY 即时退税。']},
  {title:'阶段二｜抵达机场',subtitle:'系统初始化',items:['落地后优先出关，不在机场乱逛。','主住弘大就盯 N6002；主住钟路 / 首尔站才看 N6701。','第一晚用韩元现金解决夜巴和便利店，不把支付宝当夜巴主支付。','第二天在弘大买 Climate Card，不在落地夜研究复杂交通卡。','第二天再找弘大 / 明洞 / 首尔站一带办 WOWPASS，小额试刷成功后再当主力。']},
  {title:'阶段三｜首尔执行',subtitle:'游玩与购物',items:['景福宫 / 北村 / 益善洞 / 广藏市场走经典线。','药妆只买 1+1、SALE、即时退税款。','衣服主战场是 GOTO Mall，不是潮牌街。','吃饭优先吐司、饭卷、汤饭、炸酱面。']},
  {title:'阶段四｜回程',subtitle:'收口与资源释放',items:['大额退税商品别先托运。','先确认退税 / 提货，再托运，再安检。','回程日不开新景点，只做补漏和去机场。']}
];
const guideSections=[
  {title:'🌙 深夜机场线',open:true,bullets:['23:50 抵达仁川 T1，现实里优先盯 01:00 / 01:40 的 N6002 去弘大。','深夜打车有夜间加价，除非真的错过夜巴，不然不要默认打车。','4/28 晚班机返程时，至少提前 3 小时回到 T1；有退税和免税提货时按 3.5 小时准备。']},
  {title:'📱 App 与硬通货',open:false,bullets:['导航用 Naver Map，翻译用 Papago，打车用 Kakao T。','eSIM、转换插头、充电宝、支付宝、微信、韩元现金、人民币现金和能用的银联卡都要提前准备。','没有 Visa 时别慌：支付宝负责国内预付和部分韩国商户补位，韩元现金负责落地夜巴和交通充值，WOWPASS 负责市区刷卡兜底。','WOWPASS 可以做支付和交通卡兜底，但它不是免费神卡。']},
  {title:'💳 没有 Visa 怎么付',open:false,bullets:['出发前：酒店、eSIM、保险和能预约的项目优先用支付宝 / 微信在国内付完，订单截图离线保存。','落地第一晚：只靠韩元现金解决 N6002 夜巴、便利店和应急，不在机场研究复杂支付。','第二天：到弘大 / 明洞 / 首尔站一带办 WOWPASS，小额试刷成功后再当韩国本地支付主力。','支付宝：看到 Alipay+ / ZeroPay 或店员确认 Alipay okay 再用；传统市场、路边小店、交通充值和老式储物柜仍按现金准备。','购物退税：Olive Young / Daiso / 大型商场先问 Alipay okay? Tax refund okay? 即时退税看护照和店铺规则，不是必须 Visa。']},
  {title:'🚫 海关与 17 岁特别注意',open:false,bullets:['肉类、水果、蔬菜、种子、中药材这类别带。','你 17 岁，不建议碰烟酒额度逻辑，最稳就是不买不带。','酒店可能要求监护人同意书和监护人证件复印件，提前邮件确认。']},
  {title:'💸 退税顺序',open:false,bullets:['即时退税先在店里直接做，记得带实体护照。','高额商品默认按先机场确认、后托运处理。','过安检后再去免税提货点拿线上订单。']}
];
const days=[
  {day:'Day 1｜4/24 周五晚',goal:'落地后只做出关、上车、睡觉',times:['落地后 00:00–00:40','出关后 00:40–01:10','上车到入住 01:00–02:30'],tasks:[{id:'d1a',text:'酒店地址、入住方式和去酒店路线都已截图'},{id:'d1b',text:'已经确认 N6002 站点并顺利上车'},{id:'d1c',text:'第一晚已用韩元现金兜底，没有把支付宝当夜巴主支付'},{id:'d1d',text:'只做便利店补给，没有夜里乱逛'},{id:'d1e',text:'手机和充电宝都已充上电'}],note:'第一晚核心不是玩，是稳稳到弘大；没有 Visa 时，现金比任何扫码支付都更稳。'},
  {day:'Day 2｜4/25 周六',goal:'先买 Climate Card，再走钟路经典线',times:['早上 09:30–11:30','中午 11:30–14:30','下午 14:30–18:00','晚上 18:00–20:30'],tasks:[{id:'d2a',text:'已经在弘大买好 Climate Card'},{id:'d2b',text:'今天已把景福宫放在第一站，不留到周二'},{id:'d2c',text:'北村只顺路看，没有在小巷绕太久'},{id:'d2d',text:'广藏市场只吃了最想吃的 1–2 样，没有一路乱买'}],note:'今天最值的是钟路线一口气走顺，不要晚饭后再补去江南或塔。'},
  {day:'Day 3｜4/26 周日',goal:'弘大 / 延南慢逛，下午去明洞扫药妆',times:['早上 10:00–12:30','中午 12:30–14:00','下午 14:00–18:30','晚上 18:30–21:00'],tasks:[{id:'d3a',text:'今天是轻松日，没有一早赶景点'},{id:'d3b',text:'Olive Young 已按清单买，优先看 1+1 和 SALE'},{id:'d3c',text:'付款前已问 Alipay okay? Tax refund okay? 没有 Visa 就用 WOWPASS / 支付宝 / 现金兜底'},{id:'d3d',text:'今天咖啡控制在一杯，没有被网红店带节奏'},{id:'d3e',text:'退税小票和未拆封商品已经分开放好'}],note:'明洞今天只做药妆和补货，不在主街边走边吃；支付宝能用就用，不能用马上切 WOWPASS 或现金。'},
  {day:'Day 4｜4/27 周一',goal:'GOTO Mall + 盘浦汉江，少花钱不走远',times:['早上 09:30–12:30','中午 12:30–14:00','下午 14:00–17:30','晚上 17:30–20:00'],tasks:[{id:'d4a',text:'今天主跑 GOTO Mall，没有临时再加圣水或江南'},{id:'d4b',text:'只买了基础款衣服和小配件，没有冲动拿大件'},{id:'d4c',text:'午饭和晚饭都保持了一人食简餐节奏'},{id:'d4d',text:'傍晚只去盘浦汉江看夜景，没有再加收费项目'}],note:'这一天以平价衣服和免费夜景为核心，不给潮牌和咖啡留预算。'},
  {day:'Day 5｜4/28 周二',goal:'4/28 晚班机返程版：补漏、退税、去机场',times:['早上 10:00–12:30','中午 12:30–15:00','下午 15:00–18:00','晚上 18:00 以后'],tasks:[{id:'d5a',text:'最后补货只在弘大 / 明洞的既定店铺完成'},{id:'d5b',text:'退税小票、护照、充电宝和未拆封商品已单独整理好'},{id:'d5c',text:'今天没有再开新景点或新商场'},{id:'d5d',text:'已经按 23:40 航班节奏提前出发去仁川 T1'}],note:'今天只收口，不开新景点；先退税 / 提货，再托运行李，再安检。'}
];
const shopping=[
  {name:'Dr.G Green Mild Up Sun+ 50ml',kr:'60–90 RMB',cn:'129–169 RMB',gap:'价差约 40–80',tip:'第一梯队，小体积、需求广、最好带。'},
  {name:'Torriden Dive-In Serum 50ml',kr:'75–105 RMB',cn:'109–159 RMB',gap:'价差约 20–50',tip:'稳定补水线，回购率高。'},
  {name:'Olive Young Care Plus Scar Cover 102pcs',kr:'28–40 RMB',cn:'45–69 RMB',gap:'价差约 10–25',tip:'最轻最好塞，送人也稳。'},
  {name:'Mediheal Madecassoside Blemish Pad 100+100',kr:'95–135 RMB',cn:'129–189 RMB',gap:'价差约 30–60',tip:'活动期很强，但体积偏大。'},
  {name:'Round Lab 1025 Dokdo Toner 200ml',kr:'55–75 RMB',cn:'89–119 RMB',gap:'价差约 20–45',tip:'自用稳，液体稍占行李。'},
  {name:'Lactofit Gold',kr:'45–65 RMB',cn:'79–109 RMB',gap:'价差约 25–45',tip:'别带太多，避免像保健品囤货。'}
];
function loadTasks(){try{return JSON.parse(localStorage.getItem(TASK_KEY)||'{}')}catch{return {}}}
function loadUi(){try{return JSON.parse(localStorage.getItem(UI_KEY)||'{"search":"","todayOnly":false}')}catch{return {search:'',todayOnly:false}}}
let tasksState=loadTasks();
let uiState=loadUi();
function saveTasks(){localStorage.setItem(TASK_KEY,JSON.stringify(tasksState));}
function saveUi(){localStorage.setItem(UI_KEY,JSON.stringify(uiState));}
function isDone(id){return Boolean(tasksState[id]);}
function normalize(text){return String(text).toLowerCase();}
function matchesQuery(parts){const q=normalize(uiState.search.trim());if(!q) return true;return parts.some((part)=>normalize(part).includes(q));}
function getTodayIndex(){const today=new Date().toISOString().slice(0,10);const idx=tripDates.indexOf(today);if(idx!==-1) return idx; if(today < tripDates[0]) return 0; return tripDates.length-1;}
function copyText(text){navigator.clipboard?.writeText(text).then(()=>alert('已复制，可直接粘贴到地图或备忘录。')).catch(()=>prompt('请手动复制下面内容：',text));}
function sharePage(){const data={title:'韩国旅行清单增强版',text:'手机直接打开就能用的韩国旅行清单',url:location.href};if(navigator.share){navigator.share(data).catch(()=>{});}else{copyText(location.href);}}
function setSearch(value){uiState.search=value;saveUi();render();}
function toggleTodayMode(){uiState.todayOnly=!uiState.todayOnly;saveUi();render();}
function renderTask(id,text){const done=isDone(id);return `<li class="task ${done?'done':''}"><label><input type="checkbox" data-check-id="${id}" ${done?'checked':''}><span class="task-text">${text}</span></label></li>`;}
function renderPhases(){return phases.map((phase)=>{const visibleItems=phase.items.filter((item)=>matchesQuery([phase.title,phase.subtitle,item]));if(!visibleItems.length) return '';const total=visibleItems.length;const done=visibleItems.filter((_,i)=>isDone(`phase-${phase.title}-${phase.items.indexOf(visibleItems[i])}`)).length;return `<article class="card"><div class="phase-top"><div><span class="chip">${phase.title}</span><h3>${phase.subtitle}</h3></div><span class="status ${done===total?'ok':''}">${done}/${total}</span></div><ul class="checklist">${visibleItems.map((item)=>renderTask(`phase-${phase.title}-${phase.items.indexOf(item)}`,item)).join('')}</ul></article>`;}).join('');}
function renderGuide(){return guideSections.filter((item)=>matchesQuery([item.title,...item.bullets])).map((item)=>`<details class="guide" ${item.open?'open':''}><summary>${item.title}</summary><div class="content"><ul>${item.bullets.map((line)=>`<li>${line}</li>`).join('')}</ul></div></details>`).join('');}
function dayProgress(day){const total=day.tasks.length;const done=day.tasks.filter((task)=>isDone(task.id)).length;return {done,total};}
function getVisibleDays(){let visible=days; if(uiState.todayOnly){visible=[days[getTodayIndex()]];} const q=uiState.search.trim(); if(q){visible=visible.filter((day)=>matchesQuery([day.day,day.goal,day.note,...day.times,...day.tasks.map((t)=>t.text)]));} return visible;}
function renderDayCard(day){const {done,total}=dayProgress(day);return `<article class="card"><div class="day-top"><div><span class="chip">${day.day}</span><h3>${day.goal}</h3></div><span class="status ${done===total?'ok':''}">执行清单：${done}/${total}</span></div><div class="time-row">${day.times.map((t)=>`<span class="time-chip">${t}</span>`).join('')}</div><p class="mini">${day.note}</p><ul class="checklist">${day.tasks.map((task)=>renderTask(task.id,task.text)).join('')}</ul><div class="copy-row"><button data-mark-day="${day.day}">当天全勾</button><button data-clear-day="${day.day}">清空当天</button></div></article>`;}
function renderDays(){const visible=getVisibleDays(); if(!visible.length) return '<div class="empty">没有匹配到相关内容，试试搜 “退税” 或 “N6002”。</div>'; return visible.map(renderDayCard).join('');}
function renderShopping(){const visible=shopping.filter((item)=>matchesQuery([item.name,item.kr,item.cn,item.gap,item.tip])); if(!visible.length) return '<div class="empty">购物区没有匹配结果。</div>'; return visible.map((item)=>`<article class="shop-card"><h3>${item.name}</h3><div class="shop-price"><span class="pill">韩国：${item.kr}</span><span class="pill warn">国内：${item.cn}</span><span class="pill bad">${item.gap}</span></div><p class="mini">${item.tip}</p></article>`).join('');}
function markDay(dayName,value){const day=days.find((d)=>d.day===dayName); if(!day) return; day.tasks.forEach((task)=>{tasksState[task.id]=value;}); saveTasks(); render();}
function render(){const totalTasks=[...phases.flatMap((p)=>p.items.map((_,i)=>`phase-${p.title}-${i}`)),...days.flatMap((d)=>d.tasks.map((t)=>t.id))];const doneTasks=totalTasks.filter((id)=>isDone(id)).length;const visibleDays=getVisibleDays();const todayLabel=days[getTodayIndex()].day;document.getElementById('app').innerHTML=`<section class="hero card"><span class="eyebrow">KR MOBILE PRO</span><h1>韩国旅行清单增强版</h1><p>现在是更丰富的手机版本：四阶段、终极指南、每天任务、购物建议都整合在一个页面里，手机直接点开就能用。</p><div class="chip-row"><span class="chip">总任务：${doneTasks}/${totalTasks.length}</span><span class="status warn">公网直开版</span><span class="build-note">更新于 2026-04-19</span></div><div class="copy-row"><button id="share">分享链接</button><button id="copy-hotel">复制酒店地址</button><button id="copy-airport">复制返程提醒</button></div></section><section class="section"><div class="card search-box"><div class="search-wrap"><input id="search-input" class="ghost-input" type="search" placeholder="搜 N6002 / 退税 / 支付宝 / 酒店 / Dr.G / GOTO" value="${uiState.search.replace(/"/g,'&quot;')}" /><div class="quick-row"><button class="quick-chip" data-quick="N6002">N6002</button><button class="quick-chip" data-quick="退税">退税</button><button class="quick-chip" data-quick="支付宝">支付宝</button><button class="quick-chip" data-quick="酒店">酒店</button><button class="quick-chip" data-quick="Dr.G">Dr.G</button><button class="quick-chip" data-quick="GOTO">GOTO</button><button id="clear-search">清空搜索</button></div></div><div class="mode-row"><span class="chip result-chip">当前结果：${visibleDays.length} 天任务视图</span><button id="toggle-today">${uiState.todayOnly ? `今天模式：${todayLabel}` : '打开今天模式'}</button></div></div></section><section class="section" id="phases"><div class="section-head"><span class="eyebrow">Timeline</span><h2>四阶段执行面板</h2><p>按阶段勾掉你已经完成的动作。</p></div><div class="list">${renderPhases() || '<div class="empty">四阶段里没有匹配结果。</div>'}</div></section><section class="section" id="guide"><div class="section-head"><span class="eyebrow">Ultimate Guide</span><h2>全方位终极指南</h2><p>保留最关键的机场、支付、App、海关、退税和住宿信息。</p></div><div class="guide-grid">${renderGuide() || '<div class="empty">指南里没有匹配结果。</div>'}</div><div class="card meta-list"><div class="meta-row"><span class="meta-label">酒店默认地址：</span><span>${hotelAddress}</span></div><div class="meta-row"><span class="meta-label">返程提醒：</span><span>4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走。</span></div></div></section><section class="section" id="days"><div class="section-head"><span class="eyebrow">Daily Plan</span><h2>每天要干什么</h2><p>每天一张卡，点一下就勾掉，刷新后也会记住。</p></div><div class="days">${renderDays()}</div></section><section class="section" id="shopping"><div class="section-head"><span class="eyebrow">Shopping</span><h2>最值得买什么</h2><p>按轻体积、价差明显、看起来更像自用或送人的方向挑，不走大货囤积路线。</p></div><div class="shop-grid">${renderShopping()}</div><div class="note">17 岁这次最稳的策略：不碰烟酒，不碰大体积保健品，不走“像商业代购”的大货逻辑；没有 Visa 就优先 WOWPASS / 支付宝 / 现金三套切换。</div></section><div class="toolbar"><div class="toolbar-inner"><a class="link" href="#phases">四阶段</a><a class="link" href="#guide">指南</a><a class="link" href="#days">每天任务</a><a class="link" href="#shopping">买什么</a><button id="reset">清空进度</button></div></div>`;document.querySelectorAll('[data-check-id]').forEach((input)=>{input.addEventListener('change',(event)=>{tasksState[event.target.dataset.checkId]=event.target.checked;saveTasks();render();});});document.querySelectorAll('[data-quick]').forEach((btn)=>btn.addEventListener('click',()=>setSearch(btn.dataset.quick)));document.getElementById('search-input').addEventListener('input',(e)=>setSearch(e.target.value));document.getElementById('clear-search').addEventListener('click',()=>setSearch(''));document.getElementById('toggle-today').addEventListener('click',toggleTodayMode);document.getElementById('reset').addEventListener('click',()=>{if(!confirm('确认清空当前设备里的所有勾选进度吗？')) return;tasksState={};saveTasks();render();});document.getElementById('copy-hotel').addEventListener('click',()=>copyText(hotelAddress));document.getElementById('copy-airport').addEventListener('click',()=>copyText('4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走，先确认退税 / 提货，再托运行李，再安检。'));document.getElementById('share').addEventListener('click',sharePage);document.querySelectorAll('[data-mark-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.markDay,true)));document.querySelectorAll('[data-clear-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.clearDay,false)));}
render();
  </script>
