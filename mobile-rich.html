5rem;font:inherit;font-weight:700;text-decoration:none}button:active,a.link:active,.quick-chip:active{transform:scale(.985)}.ghost-input{width:100%;font-weight:500}.search-box{display:grid;gap:.7rem}.search-wrap{display:grid;gap:.6rem}.quick-chip{border:1px solid var(--line);cursor:pointer}.note{padding:.85rem .95rem;border-radius:18px;background:var(--warn-soft);color:#87452b;line-height:1.7}.shop-card{display:grid;gap:.55rem;padding:.95rem;border:1px solid rgba(59,93,89,.12);border-radius:18px;background:rgba(255,255,255,.78)}.shop-price{display:flex;gap:.45rem;flex-wrap:wrap}.build-note{font-size:.82rem;color:#6b7d79}.meta-list{display:grid;gap:.4rem}.meta-row{display:flex;gap:.5rem;flex-wrap:wrap}.meta-label{font-weight:800;color:var(--text)}.hidden{display:none!important}.result-chip{background:rgba(74,117,214,.12);color:#3459b4}.empty{padding:1rem;border:1px dashed rgba(59,93,89,.18);border-radius:18px;color:var(--muted);text-align:center;background:rgba(255,255,255,.55)}@media(min-width:760px){.days,.shop-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}

  {title:'📱 App 与硬通货',open:false,bullets:['导航用 Naver Map，翻译用 Papago，打车用 Kakao T。','eSIM、转换插头、充电宝、Visa、支付宝、微信、韩元现金、人民币现金和能用的银联卡都要提前准备。','你现在有 Visa：Visa 负责大部分刷卡消费，支付宝负责国内预付和部分韩国商户补位，韩元现金负责落地夜巴和交通充值，WOWPASS 负责市区刷卡兜底。','WOWPASS 可以做支付和交通卡兜底，但它不是免费神卡。']},
  {title:'💳 有 Visa 怎么付更稳',open:false,bullets:['出发前：酒店、eSIM、保险和能预约的项目优先用支付宝 / 微信在国内付完，订单截图离线保存；Visa 作为境外主卡。','落地第一晚：优先用韩元现金解决 N6002 夜巴、便利店和应急，不在机场深夜研究复杂支付。','第二天：到弘大 / 明洞 / 首尔站一带办 WOWPASS，小额试刷成功后作为 Visa 之外的韩国本地支付兜底。','支付宝：看到 Alipay+ / ZeroPay 或店员确认 Alipay okay 再用；传统市场、路边小店、交通充值和老式储物柜仍按现金准备。','购物退税：Olive Young / Daiso / 大型商场优先刷 Visa；如果失败再切 WOWPASS 或支付宝，结账前问 Alipay okay? Tax refund okay? 即时退税看护照和店铺规则，不是必须 Visa。']},
  {title:'🏨 酒店什么时候定',open:false,bullets:['最晚建议出发前 3–5 天定死，因为你要同时确认 17 岁可入住、凌晨自助入住、能否国内预付。','优先订弘大 / 延南：夜巴 N6002 进城顺、吃饭方便、第二天出发也顺。','下单前发酒店消息：I am 17 years old. Can I check in alone with guardian consent form? I will arrive after midnight. Is self check-in available?','优先选择能用支付宝 / 微信 / 银联预付的房；如需信用卡担保，就用 Visa 并确认额度。','订完立刻截图：酒店英文名、韩文名、地址、自助入住说明、门锁码和客服电话。']},
  {title:'🚫 海关与 17 岁特别注意',open:false,bullets:['肉类、水果、蔬菜、种子、中药材这类别带。','你 17 岁，不建议碰烟酒额度逻辑，最稳就是不买不带。','酒店可能要求监护人同意书和监护人证件复印件，提前邮件确认。']},

  {day:'Day 2｜4/25 周六',goal:'交通卡 → 景福宫 → 北村 → 益善洞 → 广藏',times:['09:00–10:40 早餐交通卡','11:00–13:30 景福宫','13:30–16:30 北村益善洞','16:30–20:30 广藏清溪川'],tasks:[{id:'d2a',text:'早餐控制在 5,000–8,000 KRW，没有吃重餐'},{id:'d2b',text:'已在弘大附近处理 Climate Card / 交通卡，现场按机器显示付款'},{id:'d2c',text:'已从 Hongik Univ. Station 去 Gyeongbokgung Station，不硬搜中文店名'},{id:'d2d',text:'景福宫已放在第一站，没有拖到周二闭馆日'},{id:'d2e',text:'北村只顺路看 30–40 分钟，没有在居民区绕太久'},{id:'d2f',text:'广藏市场只吃最想吃的 1–2 样，已用小额现金控制预算'},{id:'d2g',text:'晚上已顺路回弘大，没有再加江南或塔'}],note:'今天是经典线，一整天靠地铁和步行走顺，别把路线打散。'},
  {day:'Day 3｜4/26 周日',goal:'弘大 / 延南慢逛 + 明洞 OY 采购',times:['10:00–14:00 弘大延南','14:00–18:30 明洞 OY','18:30–21:00 回弘大整理'],tasks:[{id:'d3a',text:'今天 10 点后再出门，没有一早赶景点'},{id:'d3b',text:'弘大 / 延南已慢逛，没跨城乱跑'},{id:'d3c',text:'Olive Young 已先看 1+1、SALE、Tax Refund 标签'},{id:'d3d',text:'采购优先刷 Visa，失败再切 WOWPASS / 支付宝 / 现金'},{id:'d3e',text:'结账已出示实体护照，并确认即时退税 / 小票'},{id:'d3f',text:'购物总额没有超过 2000 RMB 预算'},{id:'d3g',text:'退税小票和未拆封商品已分开放好'}],note:'明洞今天只做药妆和补货；Visa 是主卡，支付宝、WOWPASS 和现金是备用。'},
  {day:'Day 4｜4/27 周一',goal:'GOTO Mall 便宜衣服 + 盘浦汉江',times:['09:30–13:00 GOTO 第一轮','13:00–16:30 午饭补缺','17:00–20:00 汉江回弘大'],tasks:[{id:'d4a',text:'已从弘大直接去 Express Bus Terminal / GOTO Mall，没有临时加圣水或江南'},{id:'d4b',text:'已给 GOTO Mall 设置 50,000–100,000 KRW 服饰上限'},{id:'d4c',text:'只买基础款和小配件，没有拿大件或难带商品'},{id:'d4d',text:'小店用韩元现金，能刷店优先 Visa，付款方式没有卡住'},{id:'d4e',text:'午饭和晚饭保持一人食简餐，没有冲商场高价正餐'},{id:'d4f',text:'傍晚去了盘浦汉江看免费夜景，没有加收费项目'},{id:'d4g',text:'晚上已预整理行李、退税单、充电宝和护照'}],note:'今天是便宜购物和免费夜景，不给潮牌、咖啡和临时收费项目留预算。'},
  {day:'Day 5｜4/28 周二',goal:'补漏 → 退税 → 托运 → 登机',times:['10:00–15:00 最后补漏','15:00–18:00 回酒店打包','18:30–23:40 机场流程'],tasks:[{id:'d5a',text:'最后补货只买清单缺项，没有开新景点或新商场'},{id:'d5b',text:'退税小票、护照、未拆封商品已放在随手可拿的位置'},{id:'d5c',text:'充电宝已放随身包，没有放进托运行李'},{id:'d5d',text:'液体、刀剪和大件已进托运；大额退税商品未提前托运'},{id:'d5e',text:'已按 18:30–19:00 从弘大出发去仁川 T1'},{id:'d5f',text:'到机场先确认退税 / 海关验货，再托运行李，再安检'},{id:'d5g',text:'过安检后已去免税提货点，登机前 40–60 分钟到登机口附近'}],note:'4/28 23:40 起飞，4/29 凌晨到国内；今天只收口，不开新景点。'}

  {name:'Dr.G Green Mild Up Sun+ 50ml',kr:'60–90 RMB',cn:'129–169 RMB',gap:'价差约 40–80',tip:'第一梯队，小体积、需求广、最好带。'},

  {name:'Round Lab 1025 Dokdo Toner 200ml',kr:'55–75 RMB',cn:'89–119 RMB',gap:'价差约 20–45',tip:'自用稳，液体稍占行李。'},
  {name:'Lactofit Gold',kr:'45–65 RMB',cn:'79–109 RMB',gap:'价差约 25–45',tip:'别带太多，避免像保健品囤货。'}

function loadTasks(){try{return JSON.parse(localStorage.getItem(TASK_KEY)||'{}')}catch{return {}}}
function loadUi(){try{return JSON.parse(localStorage.getItem(UI_KEY)||'{"search":"","todayOnly":false}')}catch{return {search:'',todayOnly:false}}}
let tasksState=loadTasks();
let uiState=loadUi();
function saveTasks(){localStorage.setItem(TASK_KEY,JSON.stringify(tasksState));}
function saveUi(){localStorage.setItem(UI_KEY,JSON.stringify(uiState));}
function isDone(id){return Boolean(tasksState[id]);}
function normalize(text){return String(text).toLowerCase();}
function matchesQuery(parts){const q=normalize(uiState.search.trim());if(!q) return true;return parts.some((part)=>normalize(part).includes(q));}
function getTodayIndex(){const today=new Date().toISOString().slice(0,10);const idx=tripDates.indexOf(today);if(idx!==-1) return idx; if(today < tripDates[0]) return 0; return tripDates.length-1;}
function copyText(text){navigator.clipboard?.writeText(text).then(()=>alert('已复制，可直接粘贴到地图或备忘录。')).catch(()=>prompt('请手动复制下面内容：',text));}
function sharePage(){const data={title:'韩国旅行清单增强版',text:'手机直接打开就能用的韩国旅行清单',url:location.href};if(navigator.share){navigator.share(data).catch(()=>{});}else{copyText(location.href);}}
function setSearch(value){uiState.search=value;saveUi();render();}
function toggleTodayMode(){uiState.todayOnly=!uiState.todayOnly;saveUi();render();}
function renderTask(id,text){const done=isDone(id);return `<li class="task ${done?'done':''}"><label><input type="checkbox" data-check-id="${id}" ${done?'checked':''}><span class="task-text">${text}</span></label></li>`;}
function renderPhases(){return phases.map((phase)=>{const visibleItems=phase.items.filter((item)=>matchesQuery([phase.title,phase.subtitle,item]));if(!visibleItems.length) return '';const total=visibleItems.length;const done=visibleItems.filter((_,i)=>isDone(`phase-${phase.title}-${phase.items.indexOf(visibleItems[i])}`)).length;return `<article class="card"><div class="phase-top"><div><span class="chip">${phase.title}</span><h3>${phase.subtitle}</h3></div><span class="status ${done===total?'ok':''}">${done}/${total}</span></div><ul class="checklist">${visibleItems.map((item)=>renderTask(`phase-${phase.title}-${phase.items.indexOf(item)}`,item)).join('')}</ul></article>`;}).join('');}
function renderGuide(){return guideSections.filter((item)=>matchesQuery([item.title,...item.bullets])).map((item)=>`<details class="guide" ${item.open?'open':''}><summary>${item.title}</summary><div class="content"><ul>${item.bullets.map((line)=>`<li>${line}</li>`).join('')}</ul></div></details>`).join('');}
function dayProgress(day){const total=day.tasks.length;const done=day.tasks.filter((task)=>isDone(task.id)).length;return {done,total};}
function getVisibleDays(){let visible=days; if(uiState.todayOnly){visible=[days[getTodayIndex()]];} const q=uiState.search.trim(); if(q){visible=visible.filter((day)=>matchesQuery([day.day,day.goal,day.note,...day.times,...day.tasks.map((t)=>t.text)]));} return visible;}
function renderDayCard(day){const {done,total}=dayProgress(day);return `<article class="card"><div class="day-top"><div><span class="chip">${day.day}</span><h3>${day.goal}</h3></div><span class="status ${done===total?'ok':''}">执行清单：${done}/${total}</span></div><div class="time-row">${day.times.map((t)=>`<span class="time-chip">${t}</span>`).join('')}</div><p class="mini">${day.note}</p><ul class="checklist">${day.tasks.map((task)=>renderTask(task.id,task.text)).join('')}</ul><div class="copy-row"><button data-mark-day="${day.day}">当天全勾</button><button data-clear-day="${day.day}">清空当天</button></div></article>`;}
function renderDays(){const visible=getVisibleDays(); if(!visible.length) return '<div class="empty">没有匹配到相关内容，试试搜 “退税” 或 “N6002”。</div>'; return visible.map(renderDayCard).join('');}
function renderShopping(){const visible=shopping.filter((item)=>matchesQuery([item.name,item.kr,item.cn,item.gap,item.tip])); if(!visible.length) return '<div class="empty">购物区没有匹配结果。</div>'; return visible.map((item)=>`<article class="shop-card"><h3>${item.name}</h3><div class="shop-price"><span class="pill">韩国：${item.kr}</span><span class="pill warn">国内：${item.cn}</span><span class="pill bad">${item.gap}</span></div><p class="mini">${item.tip}</p></article>`).join('');}
function markDay(dayName,value){const day=days.find((d)=>d.day===dayName); if(!day) return; day.tasks.forEach((task)=>{tasksState[task.id]=value;}); saveTasks(); render();}
function render(){const totalTasks=[...phases.flatMap((p)=>p.items.map((_,i)=>`phase-${p.title}-${i}`)),...days.flatMap((d)=>d.tasks.map((t)=>t.id))];const doneTasks=totalTasks.filter((id)=>isDone(id)).length;const visibleDays=getVisibleDays();const todayLabel=days[getTodayIndex()].day;document.getElementById('app').innerHTML=`<section class="hero card"><span class="eyebrow">KR MOBILE PRO</span><h1>韩国旅行清单增强版</h1><p>现在是更丰富的手机版本：四阶段、终极指南、每天任务、购物建议都整合在一个页面里，手机直接点开就能用。</p><div class="chip-row"><span class="chip">总任务：${doneTasks}/${totalTasks.length}</span><span class="status warn">公网直开版</span><span class="build-note">更新于 2026-04-19</span></div><div class="copy-row"><button id="share">分享链接</button><button id="copy-hotel">复制酒店地址</button><button id="copy-airport">复制返程提醒</button></div></section><section class="section"><div class="card search-box"><div class="search-wrap"><input id="search-input" class="ghost-input" type="search" placeholder="搜 N6002 / 退税 / 支付宝 / 酒店 / Dr.G / GOTO" value="${uiState.search.replace(/"/g,'&quot;')}" /><div class="quick-row"><button class="quick-chip" data-quick="N6002">N6002</button><button class="quick-chip" data-quick="退税">退税</button><button class="quick-chip" data-quick="支付宝">支付宝</button><button class="quick-chip" data-quick="酒店">酒店</button><button class="quick-chip" data-quick="Dr.G">Dr.G</button><button class="quick-chip" data-quick="GOTO">GOTO</button><button id="clear-search">清空搜索</button></div></div><div class="mode-row"><span class="chip result-chip">当前结果：${visibleDays.length} 天任务视图</span><button id="toggle-today">${uiState.todayOnly ? `今天模式：${todayLabel}` : '打开今天模式'}</button></div></div></section><section class="section" id="phases"><div class="section-head"><span class="eyebrow">Timeline</span><h2>四阶段执行面板</h2><p>按阶段勾掉你已经完成的动作。</p></div><div class="list">${renderPhases() || '<div class="empty">四阶段里没有匹配结果。</div>'}</div></section><section class="section" id="guide"><div class="section-head"><span class="eyebrow">Ultimate Guide</span><h2>全方位终极指南</h2><p>保留最关键的机场、支付、App、海关、退税和住宿信息。</p></div><div class="guide-grid">${renderGuide() || '<div class="empty">指南里没有匹配结果。</div>'}</div><div class="card meta-list"><div class="meta-row"><span class="meta-label">酒店默认地址：</span><span>${hotelAddress}</span></div><div class="meta-row"><span class="meta-label">返程提醒：</span><span>4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走。</span></div></div></section><section class="section" id="days"><div class="section-head"><span class="eyebrow">Daily Plan</span><h2>每天要干什么</h2><p>每天一张卡，点一下就勾掉，刷新后也会记住。</p></div><div class="days">${renderDays()}</div></section><section class="section" id="shopping"><div class="section-head"><span class="eyebrow">Shopping</span><h2>最值得买什么</h2><p>按轻体积、价差明显、看起来更像自用或送人的方向挑，不走大货囤积路线。</p></div><div class="shop-grid">${renderShopping()}</div><div class="note">17 岁这次最稳的策略：不碰烟酒，不碰大体积保健品，不走“像商业代购”的大货逻辑；有 Visa 就优先 Visa，失败再切 WOWPASS / 支付宝 / 现金三套兜底。</div></section><div class="toolbar"><div class="toolbar-inner"><a class="link" href="#phases">四阶段</a><a class="link" href="#guide">指南</a><a class="link" href="#days">每天任务</a><a class="link" href="#shopping">买什么</a><button id="reset">清空进度</button></div></div>`;document.querySelectorAll('[data-check-id]').forEach((input)=>{input.addEventListener('change',(event)=>{tasksState[event.target.dataset.checkId]=event.target.checked;saveTasks();render();});});document.querySelectorAll('[data-quick]').forEach((btn)=>btn.addEventListener('click',()=>setSearch(btn.dataset.quick)));document.getElementById('search-input').addEventListener('input',(e)=>setSearch(e.target.value));document.getElementById('clear-search').addEventListener('click',()=>setSearch(''));document.getElementById('toggle-today').addEventListener('click',toggleTodayMode);document.getElementById('reset').addEventListener('click',()=>{if(!confirm('确认清空当前设备里的所有勾选进度吗？')) return;tasksState={};saveTasks();render();});document.getElementById('copy-hotel').addEventListener('click',()=>copyText(hotelAddress));document.getElementById('copy-airport').addEventListener('click',()=>copyText('4/28 晚班机返程版：19:00 左右从弘大往仁川 T1 走，先确认退税 / 提货，再托运行李，再安检。'));document.getElementById('share').addEventListener('click',sharePage);document.querySelectorAll('[data-mark-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.markDay,true)));document.querySelectorAll('[data-clear-day]').forEach((btn)=>btn.addEventListener('click',()=>markDay(btn.dataset.clearDay,false)));}
render();
  </script>
